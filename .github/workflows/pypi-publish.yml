name: PyPI publish

# Triggered when a `v*` tag is pushed (typically via `cz bump` followed by
# `git push --follow-tags`). Publishes all three packages (flopscope,
# flopscope-server, flopscope-client) at the tagged version under a single
# environment approval. See AGENTS.md -> "Release process".

on:
  push:
    tags:
      - 'v*'

# Deny all default permissions; each job opts in to only what it needs.
permissions: {}

# Never run two publish jobs for the same tag in parallel. Don't cancel an
# in-flight publish if another tag arrives -- let it finish atomically.
concurrency:
  group: pypi-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.package.name }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        package:
          - name: flopscope
            path: .
          - name: flopscope-server
            path: flopscope-server
          - name: flopscope-client
            path: flopscope-client
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Build distributions
        working-directory: ${{ matrix.package.path }}
        run: uv build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.package.name }}
          path: ${{ matrix.package.path }}/dist/
          if-no-files-found: error

  publish-pypi:
    name: Publish ${{ matrix.package.name }} to PyPI
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - name: flopscope
          - name: flopscope-server
          - name: flopscope-client
    # The `pypi` environment in repo settings has Required Reviewers
    # configured. A single approval click in this environment covers all
    # three matrix entries that share it.
    environment:
      name: pypi
      url: https://pypi.org/project/${{ matrix.package.name }}/
    permissions:
      # Required for Trusted Publishing (OIDC). No long-lived token stored.
      id-token: write
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ matrix.package.name }}
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: Create GitHub Release
    needs: publish-pypi
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract CHANGELOG section for this tag
        run: |
          version="${GITHUB_REF_NAME#v}"
          # Extract the section between `## v<version>` and the next `## ` header.
          # commitizen writes headers like `## v0.3.0 (2026-05-26)`.
          awk -v ver="v$version" '
            $1 == "##" && $2 == ver { capture = 1; next }
            $1 == "##" && capture { exit }
            capture { print }
          ' CHANGELOG.md > release-notes.md

          # Fallback if no matching section (defensive -- shouldn't happen if cz bump was used).
          if [ ! -s release-notes.md ]; then
            printf 'Release %s\n\nSee CHANGELOG.md for details.\n' "${GITHUB_REF_NAME}" > release-notes.md
          fi

          echo "--- release notes ---"
          cat release-notes.md
          echo "--- end ---"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes-file release-notes.md
